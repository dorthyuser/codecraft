<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Auro Heal — AI2DEV self-heal dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<style>
/* ── Design tokens ── */
:root {
  --bg:          #f6f4ef;
  --bg-raised:   #fffdf8;
  --bg-sunken:   #ece9e1;
  --line:        #e3ddd0;
  --line-soft:   #ecead9;
  --ink:         #161614;
  --ink-soft:    #4a4944;
  --ink-mute:    #8a877e;
  --ink-faint:   #b8b4a8;
  --teal:        oklch(0.62 0.10 178);
  --teal-soft:   oklch(0.92 0.04 178);
  --teal-deep:   oklch(0.40 0.09 178);
  --coral:       oklch(0.66 0.16 32);
  --coral-soft:  oklch(0.93 0.05 32);
  --coral-deep:  oklch(0.45 0.14 32);
  --amber:       oklch(0.78 0.13 75);
  --amber-soft:  oklch(0.94 0.06 75);
  --amber-deep:  oklch(0.50 0.11 75);
  --indigo:      oklch(0.55 0.12 265);
  --indigo-soft: oklch(0.93 0.04 265);
  --radius-sm:   6px;
  --radius:      10px;
  --radius-lg:   14px;
  --shadow-card: 0 1px 0 rgba(20,18,12,.04), 0 8px 28px -16px rgba(20,18,12,.10);
  --shadow-modal:0 30px 80px -20px rgba(20,18,12,.30), 0 4px 12px -4px rgba(20,18,12,.15);
  --f-display:   "Manrope","Helvetica Neue",Helvetica,sans-serif;
  --f-mono:      "JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
}

*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--f-display);
  background:var(--bg);color:var(--ink);
  font-size:14px;line-height:1.45;
  -webkit-font-smoothing:antialiased;letter-spacing:-0.005em;
}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
input,textarea,select{font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}

/* ── App shell ── */
.app{display:flex;min-height:100vh;position:relative;}

/* ── Sidebar ── */
.sidebar{
  width:232px;flex:none;
  border-right:1px solid var(--line);
  background:var(--bg-raised);
  padding:22px 16px 20px;
  display:flex;flex-direction:column;gap:28px;
  position:sticky;top:0;height:100vh;
  overflow-y:auto;z-index:200;
  transition:transform 0.25s ease;
}
@media(max-width:991.98px){
  .sidebar{position:fixed;top:0;left:0;height:100vh;transform:translateX(-100%);box-shadow:none;}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-modal);}
}

/* ── Sidebar backdrop ── */
.sidebar-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(22,22,20,0.45);backdrop-filter:blur(2px);z-index:199;
}
.sidebar-backdrop.show{display:block;}

/* ── Mobile topbar ── */
.mobile-topbar{
  display:none;position:sticky;top:0;z-index:100;
  background:var(--bg-raised);border-bottom:1px solid var(--line);
  padding:10px 16px;align-items:center;gap:12px;
}
@media(max-width:991.98px){.mobile-topbar{display:flex;}}
.hamburger{
  width:34px;height:34px;border-radius:8px;
  display:grid;place-items:center;color:var(--ink-soft);flex:none;
}
.hamburger:hover{background:var(--bg-sunken);color:var(--ink);}
.topbar-bell{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:8px;color:var(--ink-soft);
  position:relative;
}
.topbar-bell:hover{background:var(--bg-sunken);}
.topbar-badge{
  position:absolute;top:4px;right:6px;
  min-width:16px;height:16px;border-radius:8px;
  background:var(--coral-deep);color:#fff;
  font-family:var(--f-mono);font-size:9px;font-weight:700;
  display:grid;place-items:center;padding:0 3px;
}

/* ── Brand ── */
.brand{display:flex;align-items:center;gap:10px;padding:0 6px;}
.brand-mark{
  width:28px;height:28px;border-radius:8px;background:var(--ink);
  position:relative;display:grid;place-items:center;flex:none;
}
.brand-mark::before{
  content:"";width:14px;height:14px;border-radius:50%;
  border:2px solid var(--teal);border-bottom-color:transparent;
  transform:rotate(-25deg);
}
.brand-name{font-weight:700;font-size:15px;letter-spacing:-0.02em;}
.brand-sub{font-family:var(--f-mono);font-size:10px;color:var(--ink-mute);letter-spacing:0.04em;text-transform:uppercase;}

/* ── Nav ── */
.nav-group{display:flex;flex-direction:column;gap:2px;}
.nav-group-label{
  font-family:var(--f-mono);font-size:10px;
  color:var(--ink-mute);letter-spacing:0.08em;text-transform:uppercase;
  padding:0 8px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;
  color:var(--ink-soft);font-weight:500;
  cursor:pointer;width:100%;text-align:left;
}
.nav-item:hover{background:var(--bg-sunken);color:var(--ink);}
.nav-item.active{background:var(--ink);color:var(--bg-raised);}
.nav-icon{width:16px;height:16px;flex:none;}
.nav-count{
  margin-left:auto;font-family:var(--f-mono);font-size:11px;
  background:var(--bg-sunken);color:var(--ink-mute);
  padding:1px 7px;border-radius:999px;
}
.nav-item.active .nav-count{background:rgba(255,255,255,0.15);color:var(--bg-raised);}
.nav-count.alert-count{background:var(--coral-soft);color:var(--coral-deep);}

/* ── Sidebar foot ── */
.sidebar-foot{
  margin-top:auto;padding:12px;
  border:1px solid var(--line);border-radius:10px;
  background:var(--bg);font-size:12px;color:var(--ink-soft);
  display:flex;align-items:center;gap:10px;
}
.foot-avatar{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal-deep) 100%);
  color:white;display:grid;place-items:center;
  font-weight:700;font-size:12px;flex:none;
}

/* ── Main ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.content{padding:28px 36px 60px;}
@media(max-width:991.98px){.content{padding:20px 20px 48px;}}
@media(max-width:575.98px){.content{padding:14px 14px 40px;}}

/* ── Page head ── */
.page-head{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:24px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}
.page-eyebrow{font-family:var(--f-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:6px;}
.page-title{margin:0;font-size:28px;font-weight:700;letter-spacing:-0.025em;}
@media(max-width:575.98px){.page-title{font-size:22px;}}
.page-sub{margin:6px 0 0;color:var(--ink-soft);font-size:14px;}
.head-stats{display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
.stat .stat-val{font-family:var(--f-mono);font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1;}
.stat .stat-lbl{font-size:11px;color:var(--ink-mute);letter-spacing:0.04em;text-transform:uppercase;margin-top:6px;}
.stat.alert .stat-val{color:var(--coral-deep);}
.stat.good  .stat-val{color:var(--teal-deep);}

/* ── Section ── */
.section{margin-bottom:38px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.section-title{font-size:13px;font-weight:600;letter-spacing:-0.005em;}
.section-meta{font-family:var(--f-mono);font-size:11px;color:var(--ink-mute);}
.section-label{font-family:var(--f-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);margin:0 0 8px;}

/* ── Environment cards ── */
.env-card{
  background:var(--bg-raised);border:1px solid var(--line);
  border-radius:var(--radius-lg);padding:18px 18px 16px;
  position:relative;display:flex;flex-direction:column;gap:14px;overflow:hidden;
  height:100%;
}
.env-card::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(60% 80% at 100% 0%,var(--accent-tint,transparent) 0%,transparent 70%);
  pointer-events:none;
}
.env-card[data-env="aws"]   {--accent-tint:oklch(0.94 0.05 60);}
.env-card[data-env="azure"] {--accent-tint:oklch(0.93 0.05 230);}
.env-card[data-env="gcp"]   {--accent-tint:oklch(0.93 0.05 150);}
.env-card[data-env="vps"]   {--accent-tint:oklch(0.93 0.04 290);}
.env-head{display:flex;align-items:center;gap:12px;position:relative;}
.env-logo{
  width:36px;height:36px;border-radius:9px;background:var(--ink);
  color:var(--bg-raised);display:grid;place-items:center;
  font-weight:700;font-family:var(--f-mono);font-size:11px;letter-spacing:0.04em;flex:none;
}
.env-card[data-env="aws"]   .env-logo{background:oklch(0.55 0.12 60);}
.env-card[data-env="azure"] .env-logo{background:oklch(0.50 0.14 235);}
.env-card[data-env="gcp"]   .env-logo{background:oklch(0.50 0.12 150);}
.env-card[data-env="vps"]   .env-logo{background:oklch(0.40 0.06 285);}
.env-name{font-weight:700;font-size:16px;letter-spacing:-0.015em;}
.env-kind{font-family:var(--f-mono);font-size:10px;color:var(--ink-mute);letter-spacing:0.06em;text-transform:uppercase;}
.env-pulse{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:var(--f-mono);font-size:11px;color:var(--ink-soft);}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 2.4s infinite;}
.env-card[data-status="degraded"] .pulse-dot{background:var(--amber);}
@keyframes pulse{
  0%  {box-shadow:0 0 0 0 color-mix(in oklch,currentColor 40%,transparent);}
  70% {box-shadow:0 0 0 8px color-mix(in oklch,currentColor 0%,transparent);}
  100%{box-shadow:0 0 0 0 transparent;}
}
.env-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;position:relative;}
.env-stat .v{font-family:var(--f-mono);font-size:18px;font-weight:600;letter-spacing:-0.02em;}
.env-stat .l{font-size:10px;color:var(--ink-mute);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;}
.env-stat.alert .v{color:var(--coral-deep);}
.env-region{font-family:var(--f-mono);font-size:11px;color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:10px;position:relative;}
.health-bar{position:relative;height:4px;background:var(--bg-sunken);border-radius:999px;overflow:hidden;}
.health-fill{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--teal-deep),var(--teal));border-radius:999px;}
.env-card[data-status="degraded"] .health-fill{background:linear-gradient(90deg,var(--amber-deep),var(--amber));}

/* ── Env strip ── */
.env-strip{
  display:flex;gap:0;background:var(--bg-raised);
  border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;
  flex-wrap:wrap;
}
.env-strip-cell{
  flex:1;min-width:160px;padding:16px 18px;
  display:flex;flex-direction:column;gap:10px;
  border-right:1px solid var(--line-soft);position:relative;
}
.env-strip-cell:last-child{border-right:0;}
.env-strip-cell .env-head{display:flex;align-items:center;gap:10px;}
.env-strip-cell .env-logo{width:28px;height:28px;font-size:10px;border-radius:7px;}
.env-strip-cell .env-name{font-size:14px;}
.env-strip-cell .env-grid-row{display:flex;gap:18px;font-family:var(--f-mono);font-size:12px;color:var(--ink-soft);}
.env-strip-cell .env-grid-row b{font-weight:600;color:var(--ink);}
.env-strip-cell[data-env="aws"]  {box-shadow:inset 4px 0 0 oklch(0.55 0.12 60);}
.env-strip-cell[data-env="azure"]{box-shadow:inset 4px 0 0 oklch(0.50 0.14 235);}
.env-strip-cell[data-env="gcp"]  {box-shadow:inset 4px 0 0 oklch(0.50 0.12 150);}
.env-strip-cell[data-env="vps"]  {box-shadow:inset 4px 0 0 oklch(0.40 0.06 285);}

/* ── Apps table ── */
.app-list{
  background:var(--bg-raised);border:1px solid var(--line);
  border-radius:var(--radius-lg);overflow:hidden;
}
.app-row{
  display:grid;
  grid-template-columns:1.4fr 0.7fr 0.7fr 1.6fr 0.55fr 0.6fr 90px;
  gap:12px;align-items:center;
  padding:14px 18px;border-bottom:1px solid var(--line-soft);
  cursor:pointer;transition:background 0.12s;min-width:700px;
}
.app-row:last-child{border-bottom:0;}
.app-row:hover{background:var(--bg);}
.app-row.head{background:var(--bg);cursor:default;padding-top:10px;padding-bottom:10px;}
.app-row.head:hover{background:var(--bg);}
.app-row.head>div{font-family:var(--f-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);}
.app-name{font-weight:600;font-size:14px;}
.app-lang{font-family:var(--f-mono);font-size:11px;color:var(--ink-mute);margin-top:2px;}
.app-err-type{font-family:var(--f-mono);font-size:12px;color:var(--ink);}
.app-err-msg{font-family:var(--f-mono);font-size:11px;color:var(--ink-mute);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.app-occ{font-family:var(--f-mono);font-size:13px;font-weight:600;}
.app-seen{font-family:var(--f-mono);font-size:12px;color:var(--ink-mute);}
.app-fix-btn{
  background:var(--ink);color:var(--bg-raised);border-color:var(--ink);
  padding:6px 10px;font-size:12px;border-radius:7px;
  display:inline-flex;align-items:center;gap:5px;font-weight:600;
}
.app-fix-btn:hover{background:#2a2926;}
.app-fix-btn .glyph{width:10px;height:10px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 2px rgba(255,255,255,0.10);}

/* ── Badges ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:999px;
  font-family:var(--f-mono);font-size:10px;
  letter-spacing:0.04em;text-transform:uppercase;font-weight:500;
  background:var(--bg-sunken);color:var(--ink-soft);
  border:1px solid var(--line);white-space:nowrap;
}
.badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge-sev-critical{color:var(--coral-deep);background:var(--coral-soft);border-color:color-mix(in oklch,var(--coral) 35%,transparent);}
.badge-sev-high    {color:var(--coral-deep);background:var(--coral-soft);border-color:color-mix(in oklch,var(--coral) 25%,transparent);}
.badge-sev-medium  {color:var(--amber-deep);background:var(--amber-soft);border-color:color-mix(in oklch,var(--amber) 30%,transparent);}
.badge-sev-low     {color:var(--ink-soft);  background:var(--bg-sunken); border-color:var(--line);}
.badge-env-aws  {color:oklch(0.45 0.12 60); background:oklch(0.96 0.04 60);}
.badge-env-azure{color:oklch(0.40 0.14 235);background:oklch(0.96 0.04 235);}
.badge-env-gcp  {color:oklch(0.40 0.12 150);background:oklch(0.96 0.04 150);}
.badge-env-vps  {color:oklch(0.35 0.06 285);background:oklch(0.96 0.03 285);}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:7px 12px;border-radius:8px;font-weight:600;font-size:13px;
  border:1px solid var(--line);background:var(--bg-raised);color:var(--ink);
  cursor:pointer;transition:all 0.12s;white-space:nowrap;
}
.btn:hover{background:var(--bg-sunken);}
.btn-primary{background:var(--ink);color:var(--bg-raised);border-color:var(--ink);}
.btn-primary:hover{background:#2a2926;}
.btn-teal{background:var(--teal-deep);color:white;border-color:var(--teal-deep);}
.btn-teal:hover{background:oklch(0.34 0.09 178);}
.btn-coral{background:var(--coral-soft);color:var(--coral-deep);border-color:color-mix(in oklch,var(--coral) 40%,transparent);}
.btn-coral:hover{background:var(--coral);color:#fff;border-color:var(--coral-deep);}
.btn-small{padding:5px 10px;font-size:12px;}
.btn-icon{width:28px;height:28px;padding:0;border-radius:8px;}
.btn:disabled{opacity:0.45;cursor:not-allowed;}

/* ── Inputs ── */
.input,.textarea,.select{
  width:100%;border:1px solid var(--line);background:var(--bg-raised);
  border-radius:8px;padding:9px 12px;font-size:13px;
  font-family:var(--f-display);color:var(--ink);outline:none;
  transition:border-color 0.12s,box-shadow 0.12s;
}
.input.mono,.textarea.mono{font-family:var(--f-mono);font-size:12px;}
.input:focus,.textarea:focus,.select:focus{
  border-color:var(--teal-deep);
  box-shadow:0 0 0 3px color-mix(in oklch,var(--teal) 18%,transparent);
}
.textarea{resize:vertical;min-height:84px;line-height:1.5;}
.tag-mono{font-family:var(--f-mono);font-size:11px;color:var(--ink-mute);}

/* ── Fields ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1.6fr 1fr;gap:12px;}
@media(max-width:575.98px){.field-row{grid-template-columns:1fr;}}
.field label{font-family:var(--f-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-mute);}
.field .hint{font-size:11px;color:var(--ink-mute);}

/* ── Error block ── */
.err-block{
  background:#1a1c1b;color:#d8e4dd;border-radius:10px;
  padding:14px 16px;font-family:var(--f-mono);font-size:12px;
  line-height:1.65;white-space:pre-wrap;border:1px solid #232524;max-height:140px;overflow-y:auto;
}
.err-block .err-head{color:var(--coral);font-weight:600;margin-bottom:4px;}
.err-block .log-line{color:#8c9b94;}
.err-block .log-line .lvl-WARN {color:var(--amber);}
.err-block .log-line .lvl-ERROR{color:var(--coral);}
.err-block .log-line .lvl-INFO {color:oklch(0.70 0.10 220);}

/* ── Modal ── */
.scrim{
  position:fixed;inset:0;background:rgba(22,22,20,0.42);backdrop-filter:blur(4px);
  display:grid;place-items:center;z-index:400;animation:fade 0.18s ease;padding:16px;
}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.modal{
  width:min(820px,100%);max-height:88vh;
  background:var(--bg-raised);border-radius:16px;
  box-shadow:var(--shadow-modal);
  display:flex;flex-direction:column;overflow:hidden;
  animation:slidein 0.24s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slidein{
  from{opacity:0;transform:translateY(12px) scale(0.985);}
  to  {opacity:1;transform:translateY(0) scale(1);}
}
.modal-head{padding:18px 24px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;}
.modal-head h2{margin:0;font-size:17px;font-weight:700;letter-spacing:-0.015em;}
.modal-head .modal-app-meta{font-family:var(--f-mono);font-size:11px;color:var(--ink-mute);margin-top:2px;}
.modal-close{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--ink-mute);}
.modal-close:hover{background:var(--bg-sunken);color:var(--ink);}
.modal-body{padding:22px 24px 12px;overflow-y:auto;flex:1;}
.modal-foot{padding:14px 24px 18px;border-top:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--bg);}
.modal-foot .footnote{font-family:var(--f-mono);font-size:11px;color:var(--ink-mute);margin-right:auto;display:flex;align-items:center;gap:8px;}

/* ── Progress terminal ── */
.progress-shell{background:#14161a;color:#d3dbd6;border-radius:12px;border:1px solid #1f2227;font-family:var(--f-mono);overflow:hidden;}
.progress-titlebar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #1f2227;font-size:11px;color:#7a8a82;letter-spacing:0.04em;}
.tb-dots{display:flex;gap:5px;}
.tb-dots span{width:9px;height:9px;border-radius:50%;background:#2a2e34;}
.tb-title{margin-left:8px;}
.tb-clock{margin-left:auto;}
.progress-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:6px;font-size:12.5px;min-height:280px;}
.step-row{display:grid;grid-template-columns:18px 1fr auto;align-items:flex-start;gap:10px;padding:4px 0;}
.step-row .ico{width:14px;height:14px;margin-top:2px;display:grid;place-items:center;}
.step-row .ico.done{background:var(--teal);border-radius:50%;color:#0c1310;font-size:9px;}
.step-row .ico.run{border:2px solid var(--teal);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.step-row .ico.pend{width:6px;height:6px;margin-top:6px;border-radius:50%;background:#2a2e34;}
.step-row .lbl{color:#ced8d3;font-weight:500;}
.step-row .lbl .det{color:#6a7a72;font-size:11.5px;margin-top:2px;}
.step-row.pending .lbl{color:#4d574f;}
.step-row.pending .lbl .det{color:#38423d;}
.step-row .ms{color:#6a7a72;font-size:11px;}

/* ── Success card ── */
.success-card{text-align:center;padding:18px 14px 8px;}
.success-mark{
  width:64px;height:64px;margin:4px auto 14px;border-radius:50%;
  background:color-mix(in oklch,var(--teal) 18%,white);
  display:grid;place-items:center;position:relative;
}
.success-mark::after{
  content:"";position:absolute;inset:-6px;border-radius:50%;
  border:2px solid color-mix(in oklch,var(--teal) 35%,transparent);
  animation:ring 1.6s ease-out infinite;
}
@keyframes ring{0%{transform:scale(0.85);opacity:0.9;}100%{transform:scale(1.25);opacity:0;}}
.success-mark svg{width:28px;height:28px;color:var(--teal-deep);}
.success-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0;}
.success-sub{color:var(--ink-soft);margin:6px 0 18px;}
.diff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0 6px;}
@media(max-width:575.98px){.diff-grid{grid-template-columns:repeat(2,1fr);}}
.diff-cell{border:1px solid var(--line);background:var(--bg);border-radius:10px;padding:12px;text-align:left;}
.diff-cell .v{font-family:var(--f-mono);font-size:18px;font-weight:600;}
.diff-cell .v.add{color:var(--teal-deep);}
.diff-cell .v.del{color:var(--coral-deep);}
.diff-cell .l{font-size:10px;color:var(--ink-mute);letter-spacing:0.06em;text-transform:uppercase;margin-top:4px;}

/* ── Fixed apps table ── */
.fixed-table{background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;}
.fixed-row{
  display:grid;
  grid-template-columns:1.2fr 0.7fr 1.8fr 0.7fr 0.8fr 0.8fr 130px;
  gap:14px;align-items:center;
  padding:14px 18px;border-bottom:1px solid var(--line-soft);min-width:800px;
}
.fixed-row:last-child{border-bottom:0;}
.fixed-row.head{background:var(--bg);}
.fixed-row.head>div{font-family:var(--f-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);}
.fixed-commit{font-family:var(--f-mono);font-size:12px;color:var(--ink-soft);display:inline-flex;gap:6px;align-items:center;}
.fixed-commit code{background:var(--bg-sunken);padding:1px 6px;border-radius:4px;color:var(--ink);}

/* ── Misc ── */
.banner{border:1px solid var(--line);background:var(--bg-raised);border-radius:10px;padding:10px 14px;font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.banner .b-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex:none;box-shadow:0 0 0 4px color-mix(in oklch,var(--teal) 20%,transparent);}

/* ── Density compact ── */
body.density-compact .content{padding:20px 28px 50px;}
body.density-compact .env-card{padding:14px 14px 12px;gap:10px;}
body.density-compact .env-name{font-size:14px;}
body.density-compact .env-stat .v{font-size:16px;}
body.density-compact .app-row{padding:10px 18px;}
body.density-compact .page-head{margin-bottom:22px;padding-bottom:14px;}
body.density-compact .page-title{font-size:24px;}
body.density-compact .section{margin-bottom:28px;}

/* ── Alerts page ── */
.alert-list{background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;}
.alert-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-bottom:1px solid var(--line-soft);
  position:relative;
}
.alert-row:last-child{border-bottom:0;}
.alert-row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;}
.alert-row.critical::before{background:var(--coral-deep);}
.alert-row.high::before   {background:var(--coral);}
.alert-row.medium::before {background:var(--amber);}
.alert-row.low::before    {background:var(--ink-faint);}
.alert-dot{width:10px;height:10px;border-radius:50%;flex:none;transition:box-shadow 0.2s;}
.alert-dot.critical{background:var(--coral-deep);box-shadow:0 0 0 3px var(--coral-soft);}
.alert-dot.high    {background:var(--coral);     box-shadow:0 0 0 3px var(--coral-soft);}
.alert-dot.medium  {background:var(--amber);     box-shadow:0 0 0 3px var(--amber-soft);}
.alert-dot.low     {background:var(--ink-faint); }
.alert-content{flex:1;min-width:0;}
.alert-title{font-weight:600;font-size:13px;}
.alert-meta{font-size:11px;color:var(--ink-mute);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.alert-actions{display:flex;gap:6px;flex:none;flex-wrap:wrap;}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.filter-pill{
  padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;font-family:var(--f-mono);
  border:1px solid var(--line);background:var(--bg-raised);color:var(--ink-soft);cursor:pointer;
}
.filter-pill:hover{background:var(--bg-sunken);}
.filter-pill.active{background:var(--ink);color:var(--bg-raised);border-color:var(--ink);}
.filter-pill.active.critical{background:var(--coral-deep);border-color:var(--coral-deep);}
.filter-pill.active.high    {background:var(--coral);     border-color:var(--coral);}
.filter-pill.active.medium  {background:var(--amber-deep);border-color:var(--amber-deep);}
.alerts-summary{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;
}
@media(max-width:575.98px){.alerts-summary{grid-template-columns:repeat(2,1fr);}}
.alert-summary-card{
  background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;
}
.alert-summary-card .s-val{font-family:var(--f-mono);font-size:22px;font-weight:700;}
.alert-summary-card .s-lbl{font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;}
.alert-summary-card.critical .s-val{color:var(--coral-deep);}
.alert-summary-card.high     .s-val{color:var(--coral);}
.alert-summary-card.medium   .s-val{color:var(--amber-deep);}
.alert-summary-card.low      .s-val{color:var(--ink-soft);}

/* ── Settings page ── */
.settings-tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:24px;overflow-x:auto;}
.settings-tab{
  padding:10px 20px;font-size:13px;font-weight:600;
  color:var(--ink-mute);border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;margin-bottom:-2px;
}
.settings-tab:hover{color:var(--ink);}
.settings-tab.active{color:var(--teal-deep);border-bottom-color:var(--teal);}
.settings-card{background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px;margin-bottom:16px;}
.settings-card-title{font-weight:700;font-size:14px;margin:0 0 4px;}
.settings-card-sub{font-size:12px;color:var(--ink-mute);margin:0 0 20px;}
.conn-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:999px;
  font-size:11px;font-family:var(--f-mono);font-weight:600;
}
.conn-badge .conn-dot{width:7px;height:7px;border-radius:50%;flex:none;}
.conn-badge.connected   {background:var(--teal-soft); color:var(--teal-deep);}
.conn-badge.connected .conn-dot   {background:var(--teal);}
.conn-badge.disconnected{background:var(--coral-soft);color:var(--coral-deep);}
.conn-badge.disconnected .conn-dot{background:var(--coral);}
.conn-badge.testing     {background:var(--amber-soft);color:var(--amber-deep);}
.conn-badge.testing .conn-dot     {background:var(--amber);animation:pulse 1s infinite;}
.settings-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;align-items:center;}
.vps-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.vps-server{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:var(--radius);
  border:1px solid var(--line);background:var(--bg);
}
.vps-host{font-family:var(--f-mono);font-size:12px;font-weight:600;}
.vps-meta{font-size:11px;color:var(--ink-mute);margin-top:2px;}
.vps-add-btn{
  border:1px dashed var(--line);border-radius:var(--radius);padding:10px 14px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  color:var(--ink-mute);font-size:13px;cursor:pointer;background:none;width:100%;
}
.vps-add-btn:hover{background:var(--bg-sunken);color:var(--ink);border-color:var(--ink-faint);}

/* ── Tweaks panel ── */
.twk-panel{
  position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
  max-height:calc(100vh - 32px);display:flex;flex-direction:column;
  background:rgba(250,249,247,.88);color:#29261b;
  -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
  border:.5px solid rgba(255,255,255,.6);border-radius:14px;
  box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);

}
.twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none;}
.twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em;}
.twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;line-height:1;}
.twk-x:hover{background:rgba(0,0,0,.06);color:#29261b;}
.twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;}
.twk-row{display:flex;flex-direction:column;gap:5px;}
.twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px;}
.twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72);}
.twk-lbl>span:first-child{font-weight:500;}
.twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0;}
.twk-sect:first-child{padding-top:0;}
.twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none;}
.twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s;}
.twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:pointer;padding:4px 6px;line-height:1.2;}
.twk-chips{display:flex;gap:6px;}
.twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;padding:0;border:0;border-radius:6px;overflow:hidden;cursor:pointer;box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);transition:transform .12s cubic-bezier(.3,.7,.4,1),box-shadow .12s;}
.twk-chip:hover{transform:translateY(-1px);box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12);}
.twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),0 2px 6px rgba(0,0,0,.15);}
.twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:pointer;}
.twk-btn:hover{background:rgba(0,0,0,.88);}
.twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0;flex-shrink:0;}
.twk-toggle[data-on="1"]{background:#34c759;}
.twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s;}
.twk-toggle[data-on="1"] i{transform:translateX(14px);}

function LogLine({ line }) {
  const m = line.match(/^(\[[^\]]+\])\s+(\w+)\s+(.*)$/);
  if (!m) return <div className="log-line">{line}</div>;
  const [,ts,lvl,rest] = m;
  return (
    <div className="log-line">

      <span className={`lvl-${lvl}`}>{lvl}</span>{" "}
      <span>{rest}</span>

  );
}

function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === "object" && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title="Tweaks", children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x:16, y:16 });
  const PAD = 16;
  const clamp = useCallback(() => {
    const p = dragRef.current; if(!p) return;
    const w=p.offsetWidth, h=p.offsetHeight;
    offsetRef.current = {
      x:Math.min(Math.max(PAD,offsetRef.current.x), Math.max(PAD,window.innerWidth -w-PAD)),
      y:Math.min(Math.max(PAD,offsetRef.current.y), Math.max(PAD,window.innerHeight-h-PAD)),
    };
    p.style.right = offsetRef.current.x+"px";
    p.style.bottom = offsetRef.current.y+"px";
  }, []);
  useEffect(() => { if(!open) return; clamp(); window.addEventListener("resize",clamp); return ()=>window.removeEventListener("resize",clamp); }, [open,clamp]);
  useEffect(() => {
    const h = (e) => { const t=e?.data?.type; if(t==="__activate_edit_mode") setOpen(true); if(t==="__deactivate_edit_mode") setOpen(false); };
    window.addEventListener("message",h);
    window.parent.postMessage({type:"__edit_mode_available"},"*");
    return ()=>window.removeEventListener("message",h);
  }, []);
  const onDragStart = (e) => {
    const p=dragRef.current; if(!p) return;
    const r=p.getBoundingClientRect(), sx=e.clientX, sy=e.clientY;
    const sr=window.innerWidth-r.right, sb=window.innerHeight-r.bottom;
    const move=(ev)=>{ offsetRef.current={x:sr-(ev.clientX-sx),y:sb-(ev.clientY-sy)}; clamp(); };
    const up=()=>{ window.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
  };
  if(!open) return (
    <button onClick={()=>setOpen(true)} style={{position:"fixed",right:16,bottom:16,zIndex:2147483646,background:"rgba(250,249,247,.88)",border:".5px solid rgba(255,255,255,.6)",borderRadius:10,padding:"8px 12px",boxShadow:"0 4px 20px rgba(0,0,0,.12)",cursor:"pointer",font:"11.5px/1.4 ui-sans-serif,system-ui,sans-serif",color:"#29261b",fontWeight:600,backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",display:"flex",alignItems:"center",gap:6}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:"var(--teal)",display:"inline-block"}}/>Tweaks
    </button>
  );
  return (
    <div ref={dragRef} className="twk-panel" style={{right:offsetRef.current.x,bottom:offsetRef.current.y}}>
      <div className="twk-hd" onMouseDown={onDragStart}>
        <b>{title}</b>
        <button className="twk-x" onMouseDown={e=>e.stopPropagation()} onClick={()=>setOpen(false)}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>
  );
}
function TweakSection({label,children}){return(<><div className="twk-sect">{label}</div>{children}</>);}
function TweakRow({label,children}){return(<div className="twk-row"><div className="twk-lbl"><span>{label}</span></div>{children}</div>);}
function TweakRadio({label,value,options,onChange}){
  const opts=options.map(o=>typeof o==="object"?o:{value:o,label:o});
  const idx=Math.max(0,opts.findIndex(o=>o.value===value));

  return(<TweakRow label={label}><div role="radiogroup" className="twk-seg"><div className="twk-seg-thumb" style={{left:`calc(2px + ${idx} * (100% - 4px) / ${n})`,width:`calc((100% - 4px) / ${n})`}}/>{opts.map(o=>(<button key={o.value} type="button" role="radio" aria-checked={o.value===value} onClick={()=>onChange(o.value)}>{o.label}</button>))}</div></TweakRow>);
}
function TweakColor({label,value,options,onChange}){
  const key=o=>String(JSON.stringify(o)).toLowerCase();
  const cur=key(value);
  return(<TweakRow label={label}><div className="twk-chips" role="radiogroup">{options.map((o,i)=>{const on=key(o)===cur;return(<button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on?"1":"0"} style={{background:o}} onClick={()=>onChange(o)}>{on&&(<svg viewBox="0 0 14 14" aria-hidden="true" style={{position:"absolute",top:6,left:6,width:13,height:13}}><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke="rgba(255,255,255,0.9)"/></svg>)}</button>);})}</div></TweakRow>);
}
function TweakToggle({label,value,onChange}){return(<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><button type="button" className="twk-toggle" data-on={value?"1":"0"} role="switch" aria-checked={!!value} onClick={()=>onChange(!value)}><i/></button></div>);}
function TweakButton({label,onClick,secondary=false}){return(<button type="button" className={secondary?"twk-btn twk-btn-secondary":"twk-btn"} style={secondary?{background:"rgba(0,0,0,.06)",color:"inherit"}:{}} onClick={onClick}>{label}</button>);}

  const filtered = active.filter(a => filter==="all" || a.severity===filter);
  const countBySev = sev => active.filter(a=>a.severity===sev).length;

  return (
    <div>

        <div>
          <div className="page-eyebrow">Monitoring · Live</div>

          <button key={sev} className={`filter-pill ${filter===sev?"active "+sev:""}`} onClick={()=>setFilter(sev)}>

  );

// ── Progress terminal ──────────────────────────────────────────────────────

function ProgressStage({ steps, app, onDone }) {
  const [active, setActive] = useState(0);
  const [doneTimes, setDoneTimes] = useState({});
  const startRef = useRef(performance.now());
  const sessionId = useRef(Math.floor(1000+Math.random()*9000)).current;

  useEffect(() => {
    if(active>=steps.length){onDone();return;}
    const dur=500+Math.random()*900;
    const t=setTimeout(()=>{setDoneTimes(d=>({...d,[active]:(dur/1000).toFixed(2)+"s"}));setActive(active+1);},dur);
    return ()=>clearTimeout(t);
  }, [active]);

  const [clock, setClock] = useState("0.0s");
  useEffect(() => {
    const i=setInterval(()=>{setClock(((performance.now()-startRef.current)/1000).toFixed(1)+"s");},100);
    return ()=>clearInterval(i);
  }, []);

  const fill = (tpl)=>tpl.replace("{repo}",app.repo).replace("{branch}",app.branch);

  return (
    <div className="progress-shell">
      <div className="progress-titlebar">
        <div className="tb-dots"><span/><span/><span/></div>
        <div className="tb-title">auro-heal · session #{sessionId}</div>
        <div className="tb-clock">{clock}</div>
      </div>
      <div className="progress-body">
        {steps.map((s,i)=>{
          const state=i<active?"done":i===active?"run":"pend";
          return(
            <div key={i} className={`step-row ${state==="pend"?"pending":""}`}>
              <div className={`ico ${state}`}>{state==="done"?"✓":""}</div>
              <div className="lbl">{s.label}<div className="det">{fill(s.detail)}</div></div>
              <div className="ms">{doneTimes[i]||(state==="run"?"running…":"")}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FixFlow({ app, onClose, onFixed }) {
  const [step,         setStep]        = useState("review");

  const [branch,       setBranch]      = useState(app.branch);

  const [commitMsg,    setCommitMsg]   = useState(`fix(${app.name}): patch ${app.errorType} via auro-heal`);
  const [commitHash,   setCommitHash]  = useState("");

  const patch = useRef({filesChanged:3,additions:41,deletions:18,testsPassed:184,summary:"Guarded undefined access in payments.validatePayment and added null-safe path through the order processor. Regression test added."}).current;

      setCommitHash(Array.from({length:7},()=>"0123456789abcdef"[Math.floor(Math.random()*16)]).join(""));
      setStep("committed");

  const finish = ()=>onFixed({
    app:app.name,env:app.env,errorType:app.errorType,summary:patch.summary,

  indigo: { hex:"#4f5cc7", d:"oklch(0.42 0.13 270)", m:"oklch(0.58 0.14 270)", s:"oklch(0.93 0.04 270)" },
  lime:   { hex:"#3aa84f", d:"oklch(0.45 0.13 140)", m:"oklch(0.65 0.16 140)", s:"oklch(0.93 0.06 140)" },
  coral:  { hex:"#d0623f", d:"oklch(0.45 0.14 32)",  m:"oklch(0.66 0.16 32)",  s:"oklch(0.93 0.05 32)"  },
};
const accentHex   = (k)=>(ACCENT_MAP[k]||ACCENT_MAP.teal).hex;
const hexToAccent = (hex)=>{ const e=Object.entries(ACCENT_MAP).find(([,v])=>v.hex.toLowerCase()===hex.toLowerCase()); return e?e[0]:"teal"; };

// ── Root app ───────────────────────────────────────────────────────────────

const DEFAULTS = { accent:"teal", density:"comfortable", envEmphasis:"cards" };

function App() {
  const [tweaks,    setTweak]    = useTweaks(DEFAULTS);
  const [page,      setPage]     = useState("dashboard");
  const [sidebar,   setSidebar]  = useState(false);
  const [modalApp,  setModalApp] = useState(null);
  const [errorApps, setErrorApps]= useState(DATA.apps);
  const [fixed,     setFixed]    = useState(DATA.fixed);
  const [dismissed, setDismissed]= useState([]);

  const navigate = (p) => { setPage(p); setSidebar(false); };

  useEffect(()=>{
    const c=ACCENT_MAP[tweaks.accent]||ACCENT_MAP.teal;
    document.documentElement.style.setProperty("--teal-deep",c.d);
    document.documentElement.style.setProperty("--teal",c.m);
    document.documentElement.style.setProperty("--teal-soft",c.s);
  }, [tweaks.accent]);

  useEffect(()=>{
    document.body.classList.toggle("density-compact", tweaks.density==="compact");
  }, [tweaks.density]);

  const handleFixed = (rec) => {
    setErrorApps(xs=>xs.filter(a=>a.name!==rec.app));
    setFixed(xs=>[{...rec,id:"fix-"+Date.now()},...xs]);
    setModalApp(null);
    setPage("fixed");
  };

  const handleRefix = (item) => {
    setModalApp({
      id:"refix-"+item.id, name:item.app, env:item.env, lang:"—",
      severity:"medium", occurrences:1, lastSeen:"now",
      errorType:item.errorType,
      error:`Previously fixed: ${item.summary}\n  commit ${item.commit} on ${item.branch}`,
      logExcerpt:["[2026-05-17 09:00:00] INFO  re-fix requested by user","[2026-05-17 09:00:00] WARN  prior patch did not fully resolve issue"],
      repo:item.repo, branch:item.branch,
    });
  };

  const handleDismiss = (id) => setDismissed(xs=>[...xs,id]);
  const activeAlerts = errorApps.filter(a=>!dismissed.includes(a.id));
  const dashData = useMemo(()=>({...DATA,apps:errorApps}), [errorApps]);

  return (
    <div className="app">
      {/* Mobile backdrop */}
      {sidebar && <div className="sidebar-backdrop show" onClick={()=>setSidebar(false)}/>}

      {/* Sidebar */}
      <Sidebar
        page={page} onNav={navigate}
        errorCount={errorApps.length}
        alertCount={activeAlerts.length}
        fixedCount={fixed.length}
        open={sidebar}
      />

      {/* Main area */}
      <div className="main">
        {/* Mobile topbar */}
        <div className="mobile-topbar">
          <button className="hamburger" onClick={()=>setSidebar(true)} aria-label="Open menu">
            <Icon.menu width="18" height="18"/>
          </button>
          <div className="brand" style={{padding:0}}>
            <div className="brand-mark"/>
            <span className="brand-name">Auro Heal</span>
          </div>
          <button className="topbar-bell" onClick={()=>navigate("alerts")} aria-label="Alerts">
            <Icon.bell width="18" height="18"/>
            {activeAlerts.length>0&&<span className="topbar-badge">{activeAlerts.length}</span>}
          </button>
        </div>

        {/* Page content */}
        <div className="content">
          {page==="dashboard" && <Dashboard data={dashData} onPickApp={setModalApp} envEmphasis={tweaks.envEmphasis}/>}
          {page==="alerts"    && <AlertsPage apps={errorApps} onFix={setModalApp} dismissed={dismissed} onDismiss={handleDismiss}/>}
          {page==="fixed"     && <FixedApps items={fixed} onRefix={handleRefix}/>}
          {page==="settings"  && <SettingsPage/>}
        </div>
      </div>

      {/* Fix flow modal */}
      {modalApp && <FixFlow app={modalApp} onClose={()=>setModalApp(null)} onFixed={handleFixed}/>}

      {/* Tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Accent">
          <TweakColor label="Color" value={accentHex(tweaks.accent)} options={["#1d8f8c","#4f5cc7","#3aa84f","#d0623f"]} onChange={hex=>setTweak("accent",hexToAccent(hex))}/>
        </TweakSection>
        <TweakSection label="Layout">
          <TweakRadio label="Density" value={tweaks.density} options={[{label:"Cozy",value:"comfortable"},{label:"Compact",value:"compact"}]} onChange={v=>setTweak("density",v)}/>
          <TweakRadio label="Env style" value={tweaks.envEmphasis} options={[{label:"Cards",value:"cards"},{label:"Strip",value:"strip"}]} onChange={v=>setTweak("envEmphasis",v)}/>
        </TweakSection>
        <TweakSection label="Actions">
          <TweakButton label="Reset demo data" onClick={()=>{ setErrorApps(DATA.apps); setFixed(DATA.fixed); setDismissed([]); }}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
